version: 2

models:
  - name: int_customer_lifecycle
    description: "Customer enriquecido con company, subscription y campos calculados"
    tests:
      - dbt_utils.expression_is_true:
          expression: "count(*) >= 500"
          name: int_customer_lifecycle_min_rows
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: plan_tier
        tests:
          - accepted_values:
              values: [1, 2, 3, 4]

  - name: int_subscription_metrics
    description: "Métricas de suscripciones y pagos por customer"
    tests:
      - dbt_utils.expression_is_true:
          expression: "count(*) >= 500"
          name: int_subscription_metrics_min_rows
    columns:
      - name: customer_id
        tests: [not_null]
      - name: mrr_movement_type
        tests:
          - accepted_values:
              values: ["new","expansion","contraction",
                       "churned","retained"]

  - name: int_product_engagement
    description: "Métricas de engagement de producto últimos 30 días"
    tests:
      - dbt_utils.expression_is_true:
          expression: "count(*) >= 500"
          name: int_product_engagement_min_rows
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: engagement_score
        tests: [not_null]