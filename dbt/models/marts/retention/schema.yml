version: 2

models:
  - name: fct_churn
    description: "Logo Churn Rate y Revenue Churn Rate por mes y segmento"
    tests:
      - min_row_count:
          min_rows: 10
          name: fct_churn_min_rows
    columns:
      - name: month
        tests: [not_null]
      - name: segment
        tests: [not_null]
      - name: logo_churn_rate_pct
        tests: [not_null]

  - name: fct_cohort_retention
    description: "Cohort Retention Rate mensual — 13 meses de vida por cohorte"
    tests:
      - min_row_count:
          min_rows: 50
          name: fct_cohort_retention_min_rows
    columns:
      - name: cohort_month
        tests: [not_null]
      - name: months_since_signup
        tests: [not_null]
      - name: retention_rate_pct
        tests: [not_null]

  - name: fct_ltv
    description: "LTV, LTV/CAC y Payback Period por segmento y plan"
    tests:
      - min_row_count:
          min_rows: 10
          name: fct_ltv_min_rows
    columns:
      - name: segment
        tests: [not_null]
      - name: ltv
        tests: [not_null]
