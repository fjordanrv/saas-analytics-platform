version: 2

models:
  - name: stg_customers
    description: "Clientes del CRM — limpieza y normalización básica"
    tests:
      - dbt_utils.expression_is_true:
          expression: "count(*) >= 500"
          name: stg_customers_min_rows
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: email
        tests: [not_null]
      - name: plan
        tests:
          - accepted_values:
              values: ["Starter","Pro","Business","Enterprise"]
      - name: status
        tests:
          - accepted_values:
              values: ["active","churned","trial"]
      - name: mrr
        tests: [not_null]

  - name: stg_companies
    description: "Empresas del CRM"
    tests:
      - dbt_utils.expression_is_true:
          expression: "count(*) >= 100"
          name: stg_companies_min_rows
    columns:
      - name: company_id
        tests: [not_null, unique]

  - name: stg_subscriptions
    description: "Suscripciones del sistema de billing"
    tests:
      - dbt_utils.expression_is_true:
          expression: "count(*) >= 500"
          name: stg_subscriptions_min_rows
    columns:
      - name: sub_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: mrr
        tests: [not_null]

  - name: stg_payments
    description: "Pagos del sistema de billing"
    tests:
      - dbt_utils.expression_is_true:
          expression: "count(*) >= 5000"
          name: stg_payments_min_rows
    columns:
      - name: payment_id
        tests: [not_null, unique]
      - name: payment_status
        tests:
          - accepted_values:
              values: ["paid","failed","refunded"]

  - name: stg_product_events
    description: "Eventos de producto — acciones de usuarios"
    tests:
      - dbt_utils.expression_is_true:
          expression: "count(*) >= 10000"
          name: stg_product_events_min_rows
    columns:
      - name: event_id
        tests: [not_null, unique]
      - name: event_type
        tests:
          - accepted_values:
              values: ["login","feature_use","export",
                       "api_call","invite","settings","billing"]

  - name: stg_marketing_leads
    description: "Leads de la plataforma de marketing"
    tests:
      - dbt_utils.expression_is_true:
          expression: "count(*) >= 200"
          name: stg_marketing_leads_min_rows
    columns:
      - name: lead_id
        tests: [not_null, unique]

  - name: stg_nps_surveys
    description: "Encuestas NPS de Customer Success"
    tests:
      - dbt_utils.expression_is_true:
          expression: "count(*) >= 100"
          name: stg_nps_surveys_min_rows
    columns:
      - name: nps_id
        tests: [not_null, unique]
      - name: nps_score
        tests: [not_null]

  - name: stg_support_tickets
    description: "Tickets de soporte de Customer Success"
    tests:
      - dbt_utils.expression_is_true:
          expression: "count(*) >= 100"
          name: stg_support_tickets_min_rows
    columns:
      - name: ticket_id
        tests: [not_null, unique]