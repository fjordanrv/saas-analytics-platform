saas_analytics:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', '/usr/local/airflow/project/data/cloudmetrics.duckdb') }}"
      threads: 4
      schema: analytics
    prod:
      type: databricks
      host: "{{ env_var('DATABRICKS_HOST', '') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH', '') }}"
      token: "{{ env_var('DATABRICKS_TOKEN', '') }}"
      catalog: "{{ env_var('DATABRICKS_CATALOG', 'saas_platform') }}"
      schema: "{{ env_var('DATABRICKS_SCHEMA', 'staging') }}"
      threads: 4
