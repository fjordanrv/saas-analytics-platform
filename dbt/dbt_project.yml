name: saas_analytics
version: '1.0.0'
config-version: 2
profile: saas_analytics

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  saas_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: table
      +schema: intermediate
    marts:
      +materialized: table
      finance:
        +schema: finance
      growth:
        +schema: growth
      retention:
        +schema: retention

seeds:
  saas_analytics:
    +schema: seeds
